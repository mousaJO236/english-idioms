    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.velocity = {x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8}; this.alpha = 1; }
            draw() { ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill(); }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.01; }
        }

        let particles = [];
        function firework(x, y) {
            const colors = ['#FF4500', '#FFD700', '#00BFFF', '#FF69B4', '#FFFFFF'];
            const color = colors[Math.floor(Math.random()*colors.length)];
            for(let i=0; i<60; i++) particles.push(new Particle(x, y, color));
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();

        const db = [

            {q: "That knob is ... off the dryer.", a: "to turn", i: ["for turn", "turning"]},

            {q: "When does the train arrive ... London?", a: "in", i: ["at", "on"]},

            {q: "Where do you work?", a: "large French Internet provider", i: ["small car manufacturer", "medium bottle factory"]},

            {q: "Where do you eat dinner?", a: "dining room", i: ["kitchen", "living room"]},

            {q: "I use my tablet ... the lights.", a: "to turn", i: ["for turning", "turning"]},
            {q: "Where can I do my work?", a: "study", i: ["bedroom", "garage"]},
            {q: "... lovely garden you have!", a: "What a", i: ["How", "Such"]},
            {q: "What is different about the world now?", a: "People don't listen to the radio as much", i: ["People travel less.", "Internet is slower."]},

            {q: "How is the new house?", a: "There's a lot of light.", i: ["It's very dark.", "It's too small."]},
            {q: "What is a part of the job?", a: "planning meetings", i: ["designing logos", "writing code"]},

        let quiz = [...db].sort(() => 0.5 - Math.random()).slice(0, 60);
        let currentIdx = 0, score = 0, history = [];

        function render() {
            if (currentIdx >= quiz.length) { showResults(); return; }
            const q = quiz[currentIdx];
            document.getElementById('progress').innerText = `سؤال ${currentIdx + 1} / ${quiz.length}`;
            document.getElementById('question').innerText = q.q;
            let opts = [q.a, ...q.i].sort(() => 0.5 - Math.random());
            document.getElementById('choices').innerHTML = opts.map(o => `
                <button onclick="select('${o.replace(/'/g, "\\'")}')" class="w-full p-4 border border-cyan-500/30 rounded-xl bg-cyan-900/30 hover:bg-cyan-500/40 transition font-bold text-lg">${o}</button>
            `).join('');
        }

        function select(ans) {
            const q = quiz[currentIdx];
            const isCorrect = ans === q.a;
            if (isCorrect) {
                score++;
                let start = Date.now();
                let interval = setInterval(() => {
                    firework(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                    if(Date.now() - start > 3000) clearInterval(interval);
                }, 200);
            }
            history.push({q: q.q, selected: ans, correct: q.a});
            const btns = document.querySelectorAll('#choices button');
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === q.a) b.classList.add('bg-emerald-600', 'border-emerald-400');
                else if (b.innerText === ans && !isCorrect) {
                    b.classList.add('bg-red-600', 'wrong-shake');
                    document.getElementById('question').innerHTML = `<span class="text-red-400 block mb-2 font-black">عيب هذي الاجابه تطلع منك وانت مذاكر للماجستير</span>` + q.q;
                }
            });
            setTimeout(() => { currentIdx++; render(); }, isCorrect ? 3000 : 4000);
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = `النتيجة النهائية: ${score} / ${quiz.length}`;

            history.forEach(h => {
                table += `<tr class="${h.selected === h.correct ? 'text-emerald-400' : 'text-red-400'} border-b border-white/10">
                    <td class="p-2">${h.q}</td><td class="p-2">${h.selected}</td><td class="p-2">${h.correct}</td>
                </tr>`;
            });
            document.getElementById('report-table').innerHTML = table + `</tbody></table>`;
        }
        render();
    </script>

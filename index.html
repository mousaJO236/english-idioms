<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mousa's English Idioms Book</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --book-bg: #fdfbf7;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent: #d35400;
            --border-color: #e0dcd3;
            --shadow: rgba(0, 0, 0, 0.1);
            --font-family: 'Georgia', serif;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --book-bg: #2d2d2d;
            --text-main: #f5f5f5;
            --text-muted: #b3b3b3;
            --accent: #e67e22;
            --border-color: #404040;
            --shadow: rgba(0, 0, 0, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            overflow: hidden;
            padding: 20px;
        }
        header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn { background-color: var(--book-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .progress-container { width: 100%; max-width: 500px; height: 6px; background-color: var(--border-color); border-radius: 3px; margin-bottom: 15px; }
        .progress-bar { height: 100%; width: 1%; background-color: var(--accent); transition: width 0.3s; }
        .book-container { width: 100%; max-width: 500px; height: 550px; position: relative; }
        .book { width: 100%; height: 100%; position: relative; }
        .page {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: var(--book-bg);
            border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 12px var(--shadow);
            padding: 30px 25px; display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out;
        }
        .page.active { opacity: 1; pointer-events: auto; z-index: 10; }
        .page-content { display: flex; flex-direction: column; gap: 20px; height: 100%; justify-content: center; }
        .idiom-title { font-size: 1.8rem; color: var(--accent); line-height: 1.3; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); }
        .section-title { font-family: system-ui, sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
        .meaning-box { font-size: 1.05rem; line-height: 1.4; }
        .example-box { font-style: italic; font-size: 1.05rem; line-height: 1.4; border-left: 3px solid var(--accent); padding-left: 12px; }
        .page-footer { text-align: center; font-family: system-ui, sans-serif; font-size: 0.85rem; color: var(--text-muted); padding-top: 10px; border-top: 1px dashed var(--border-color); }
        .nav-overlay { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: var(--book-bg); border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-prev { left: -20px; }
        .nav-next { right: -20px; }
        @media (max-width: 600px) { .nav-overlay { display: none; } body { padding: 10px; } .book-container { height: 70vh; } }
    </style>
</head>
<body>

<header>
    <h1>📖 Essential English Idioms</h1>
    <div class="controls">
        <button class="btn" id="themeToggle">🌗 Mode</button>
    </div>
</header>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="book-container">
    <div class="nav-overlay nav-prev" id="prevBtn" onclick="prevPage()">❮</div>
    <div class="nav-overlay nav-next" id="nextBtn" onclick="nextPage()">❯</div>
    <div class="book" id="book"></div>
</div>

let currentPageIndex = 0;
const totalPages = idiomsData.length;
const bookElement = document.getElementById('book');
const progressBar = document.getElementById('progressBar');

function initBook() {
    bookElement.innerHTML = ''; 
    idiomsData.forEach((data, index) => {
        const page = document.createElement('div');
        page.className = `page ${index === 0 ? 'active' : ''}`;
        
        page.innerHTML = `
            <div class="page-content">
                <div>
                    <div class="section-title">Idiom</div>
                    <h2 class="idiom-title">${data.idiom}</h2>
                </div>
                <div>
                    <div class="section-title">Literal Meaning</div>
                    <p class="meaning-box">${data.literal}</p>
                </div>
                <div>
                    <div class="section-title">Figurative Meaning</div>
                    <p class="meaning-box"><strong>${data.figurative}</strong></p>
                </div>
                <div>
                    <div class="section-title" style="color: #2980b9;">المعنى بالعربي والمجازي</div>
                    <p class="meaning-box" dir="rtl" style="font-family: system-ui, sans-serif; text-align: right; color: #2980b9;"><strong>${data.arabic}</strong></p>
                </div>
                <div>
                    <div class="section-title">Example Sentence</div>
                    <p class="example-box">"${data.example}"</p>
                </div>
                <div class="page-footer">
                    <span>${index + 1} / ${totalPages}</span>
                </div>
            </div>
        `;
        bookElement.appendChild(page);
    });
    updateUI();
}

function updateUI() {
    const pages = document.querySelectorAll('.page');
    pages.forEach((page, index) => {
        if (index === currentPageIndex) { page.classList.add('active'); } else { page.classList.remove('active'); }
    });
    const progressPercent = ((currentPageIndex + 1) / totalPages) * 100;
    progressBar.style.width = `${progressPercent}%`;
}

function nextPage() { if (currentPageIndex < totalPages - 1) { currentPageIndex++; updateUI(); } }
function prevPage() { if (currentPageIndex > 0) { currentPageIndex--; updateUI(); } }

let touchStartX = 0; let touchEndX = 0;
bookElement.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
bookElement.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; if (touchStartX - touchEndX > 50) nextPage(); if (touchEndX - touchStartX > 50) prevPage(); }, { passive: true });

document.getElementById('themeToggle').addEventListener('click', () => {
    if (document.documentElement.getAttribute('data-theme') === 'dark') { document.documentElement.removeAttribute('data-theme'); } else { document.documentElement.setAttribute('data-theme', 'dark'); }
});
window.onload = initBook;
</script>

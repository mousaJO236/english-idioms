<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mousa's English Idioms Book</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --book-bg: #fdfbf7;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent: #d35400;
            --border-color: #e0dcd3;
            --shadow: rgba(0, 0, 0, 0.1);
            --font-family: 'Georgia', serif;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --book-bg: #2d2d2d;
            --text-main: #f5f5f5;
            --text-muted: #b3b3b3;
            --accent: #e67e22;
            --border-color: #404040;
            --shadow: rgba(0, 0, 0, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            overflow: hidden;
            padding: 20px;
        }
        header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn { background-color: var(--book-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .progress-container { width: 100%; max-width: 500px; height: 6px; background-color: var(--border-color); border-radius: 3px; margin-bottom: 15px; }
        .progress-bar { height: 100%; width: 1%; background-color: var(--accent); transition: width 0.3s; }
        .book-container { width: 100%; max-width: 500px; height: 550px; position: relative; }
        .book { width: 100%; height: 100%; position: relative; }
        .page {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: var(--book-bg);
            border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 12px var(--shadow);
            padding: 30px 25px; display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out;
        }
        .page.active { opacity: 1; pointer-events: auto; z-index: 10; }
        .page-content { display: flex; flex-direction: column; gap: 20px; height: 100%; justify-content: center; }
        
        /* تجميل واجهة الغلاف */
        .cover-content { text-align: center; display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 20px 10px; }
        .cover-title { font-size: 2.2rem; color: var(--accent); margin-bottom: 15px; line-height: 1.4; }
        .cover-subtitle { font-family: system-ui, sans-serif; font-size: 1.2rem; line-height: 1.6; direction: rtl; margin-bottom: 30px; }
        .instruction-box { background-color: rgba(41, 128, 185, 0.1); border: 1px dashed #2980b9; padding: 15px; border-radius: 8px; direction: rtl; font-family: system-ui, sans-serif; font-size: 0.95rem; line-height: 1.5; color: #2980b9; }
        .start-btn { background-color: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; font-family: system-ui, sans-serif; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .idiom-title { font-size: 1.8rem; color: var(--accent); line-height: 1.3; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); }
        .section-title { font-family: system-ui, sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
        .meaning-box { font-size: 1.05rem; line-height: 1.4; }
        .example-box { font-style: italic; font-size: 1.05rem; line-height: 1.4; border-left: 3px solid var(--accent); padding-left: 12px; }
        .page-footer { text-align: center; font-family: system-ui, sans-serif; font-size: 0.85rem; color: var(--text-muted); padding-top: 10px; border-top: 1px dashed var(--border-color); }
        .nav-overlay { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: var(--book-bg); border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-prev { left: -20px; }
        .nav-next { right: -20px; }
        @media (max-width: 600px) { .nav-overlay { display: none; } body { padding: 10px; } .book-container { height: 75vh; } .cover-title { font-size: 1.8rem; } }
    </style>
</head>
<body>

<header>
    <h1>📖 Idioms Learning</h1>
    <div class="controls">
        <button class="btn" id="themeToggle">🌗 Mode</button>
    </div>
</header>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="book-container">
    <div class="nav-overlay nav-prev" id="prevBtn" onclick="prevPage()">❮</div>
    <div class="nav-overlay nav-next" id="nextBtn" onclick="nextPage()">❯</div>
    <div class="book" id="book">
        <div class="page active" id="coverPage">
            <div class="cover-content">
                <div>
                    <h2 class="cover-title">Welcome to Mousa's Website</h2>
                    <p class="cover-subtitle">لتعلم مصطلحات اللغة الإنجليزية (Idioms) ومعانيها المجازية باللغتين العربية والإنجليزية بطريقة تفاعلية سهلة.</p>
                </div>
                
                <div class="instruction-box">
                    <strong>💡 طريقة تصفح الكتاب:</strong><br>
                    يمكنك تقليب الصفحات عبر **التمرير (السحب) لليمين أو اليسار** على الشاشة، أو استخدام الأسهم الجانبية (❮ و ❯).
                </div>

                <div>
                    <button class="start-btn" onclick="nextPage()">ابدأ التصفح الآن 📖</button>
                </div>
                <div class="page-footer">
                    <span>الغلاف</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const idiomsData = [
    { idiom: "Bite the bullet", literal: "To physically bite down on a lead bullet.", figurative: "To face a difficult situation with courage and get it over with.", arabic: "يتحمل المصاعب / يجرع الغصص (مواجهة موقف صعب بشجاعة وإنهاء الأمر).", example: "I hate going to the dentist, but I just need to bite the bullet and go." },
    { idiom: "Break a leg", literal: "Wishing someone breaks their bones.", figurative: "A superstitious way to wish a performer good luck before a show.", arabic: "بالتوفيق! / حظاً سعيداً! (تقال للممثلين أو قبل العروض والامتحانات).", example: "You're going to do great in the play tonight! Break a leg!" },
    { idiom: "Spill the beans", literal: "To accidentally knock over a container of beans.", figurative: "To reveal a secret prematurely or accidentally.", arabic: "يفشي السر / يَبُق البحصة.", example: "We were planning a surprise party, but Sarah spilled the beans." },
    { idiom: "Piece of cake", literal: "A single slice of sweet baked dessert.", figurative: "Something that is incredibly easy to do.", arabic: "أمر غاية في السهولة / شربة مي.", example: "Don't worry about the English exam; it's going to be a piece of cake." },
    { idiom: "Let the cat out of the bag", literal: "Allowing a hidden feline to escape from a sack.", figurative: "To mistakenly reveal a secret.", arabic: "يفضح الأمر / يكشف المستور (دون قصد).", example: "Tim let the cat out of the bag about the promotion before management announced it." },
    { idiom: "Under the weather", literal: "Standing physically underneath rain or clouds.", figurative: "Feeling slightly sick, ill, or exhausted.", arabic: "وعكة صحية / ليس على ما يرام (مريض قليلاً أو مرهق).", example: "I won't be able to come to work today because I'm feeling a bit under the weather." },
    { idiom: "Cost an arm and a leg", literal: "Paying for an item using your own limbs.", figurative: "Something that is extremely expensive.", arabic: "يكلف ثروة طائلة / يعور الجيب.", example: "The new smartwatches look amazing, but they cost an arm and a leg." },
    { idiom: "Hit the nail on the head", literal: "Striking a metal pin perfectly with a hammer.", figurative: "To describe exactly what is causing a situation or problem.", arabic: "أصاب كبد الحقيقة / جابها ع الجرح (وصف المشكلة بدقة).", example: "You hit the nail on the head when you said we need better marketing." },
    { idiom: "Burn the midnight oil", literal: "Keeping an oil lamp lit late into the night.", figurative: "To study or work late into the night.", arabic: "يسهر الليالي / يواصل الليل بالنهار (للدراسة أو العمل المكثف).", example: "Mousa had to burn the midnight oil to prepare for his presentation at the institute." },
    { idiom: "Once in a blue moon", literal: "An event occurring during a rare second full moon in a month.", figurative: "Something that happens very rarely.", arabic: "في النادر جداً / من العيد للعيد.", example: "Living abroad means I only get to see my extended family once in a blue moon." },
    { idiom: "Blessing in disguise", literal: "A holy gift wearing a mask.", figurative: "A misfortune that eventually results in something good happening later.", arabic: "ربّ ضارة نافعة / وعسى أن تكرهوا شيئاً وهو خير لكم.", example: "Losing that job was a blessing in disguise because I found a much better one." },
    { idiom: "Call it a day", literal: "Giving a name to a 24-hour period.", figurative: "To stop working on something for the rest of the day.", arabic: "يكتفي بهذا القدر اليوم / ينهي عمل اليوم.", example: "We've been coding for six hours; let's call it a day." },
    { idiom: "Cold shoulder", literal: "Serving someone a cold piece of meat from an animal's shoulder.", figurative: "To intentionally ignore someone or treat them in an unfriendly way.", arabic: "يعامله بجفاء / يصدّ عنه / يعطيه ظهره.", example: "After our argument, she gave me the cold shoulder all week." },
    { idiom: "Don't judge a book by its cover", literal: "Evaluating the contents of a novel solely by its front art.", figurative: "You shouldn't form an opinion about something based purely on its outward appearance.", arabic: "لا تحكم على الكتاب من غلافه / المظاهر خداعة.", example: "The hotel looked run-down from the outside, but inside it was beautiful. Don't judge a book by its cover." },
    { idiom: "The last straw", literal: "The final single piece of dried grass placed on a camel's back.", figurative: "The final problem in a series of problems that makes a situation intolerable.", arabic: "القشة التي قصمت ظهر البعير (الحد المتبقي للصبر).", example: "When the computer crashed and lost my document, it was the last straw." }
];

let currentPageIndex = 0;
const totalPages = idiomsData.length + 1; // +1 لحساب صفحة الغلاف
const bookElement = document.getElementById('book');
const progressBar = document.getElementById('progressBar');

function initBook() {
    // بناء الصفحات بعد الغلاف
    idiomsData.forEach((data, index) => {
        const page = document.createElement('div');
        page.className = `page`;
        
        page.innerHTML = `
            <div class="page-content">
                <div>
                    <div class="section-title">Idiom</div>
                    <h2 class="idiom-title">${data.idiom}</h2>
                </div>
                <div>
                    <div class="section-title">Literal Meaning</div>
                    <p class="meaning-box">${data.literal}</p>
                </div>
                <div>
                    <div class="section-title">Figurative Meaning</div>
                    <p class="meaning-box"><strong>${data.figurative}</strong></p>
                </div>
                <div>
                    <div class="section-title" style="color: #2980b9;">المعنى بالعربي والمجازي</div>
                    <p class="meaning-box" dir="rtl" style="font-family: system-ui, sans-serif; text-align: right; color: #2980b9;"><strong>${data.arabic}</strong></p>
                </div>
                <div>
                    <div class="section-title">Example Sentence</div>
                    <p class="example-box">"${data.example}"</p>
                </div>
                <div class="page-footer">
                    <span>${index + 1} / ${idiomsData.length}</span>
                </div>
            </div>
        `;
        bookElement.appendChild(page);
    });
    updateUI();
}

function updateUI() {
    const pages = document.querySelectorAll('.page');
    pages.forEach((page, index) => {
        if (index === currentPageIndex) { page.classList.add('active'); } else { page.classList.remove('active'); }
    });
    const progressPercent = ((currentPageIndex + 1) / totalPages) * 100;
    progressBar.style.width = `${progressPercent}%`;
}

function nextPage() { if (currentPageIndex < totalPages - 1) { currentPageIndex++; updateUI(); } }
function prevPage() { if (currentPageIndex > 0) { currentPageIndex--; updateUI(); } }

let touchStartX = 0; let touchEndX = 0;
bookElement.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
bookElement.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; if (touchStartX - touchEndX > 50) nextPage(); if (touchEndX - touchStartX > 50) prevPage(); }, { passive: true });

document.getElementById('themeToggle').addEventListener('click', () => {
    if (document.documentElement.getAttribute('data-theme') === 'dark') { document.documentElement.removeAttribute('data-theme'); } else { document.documentElement.setAttribute('data-theme', 'dark'); }
});
window.onload = initBook;
</script>
</body>
</html>

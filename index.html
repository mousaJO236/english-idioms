```html
<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Berlitz Advanced Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <div id="quiz-ui">
            <h1 class="text-2xl font-bold mb-4 text-center">اختبار معهد برليتز - 𝑴𝑶𝑼𝑺𝑨</h1>
            <div id="progress" class="text-blue-600 font-bold mb-6"></div>
            <div id="question" class="text-xl mb-6 font-medium text-gray-800"></div>
            <div id="choices" class="space-y-3"></div>
        </div>
        <div id="results-ui" class="hidden">
            <h2 class="text-3xl font-bold mb-6 text-center">التقرير النهائي</h2>
            <div id="final-score" class="text-2xl font-bold text-center mb-8"></div>
            <div id="report-table" class="overflow-x-auto"></div>
            <div class="mt-8 text-center">
                <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 mx-2">حفظ كـ PDF / طباعة</button>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 mx-2">إعادة الاختبار</button>
            </div>
        </div>
    </div>

    <script>
        const db = [
            {q: "I'm not coming back. I'd like a(n) ... ticket, please.", a: "one-way", i: ["round-trip", "economy"]},
            {q: "Who manages your sales? These are the departments ...", a: "that manage sales", i: ["who manages sales", "which manage sales"]},
            {q: "What does Greenglass do?", a: "medium-sized multinational bottle manufacturer", i: ["small car manufacturer", "internet provider"]},
            {q: "Who called the accounting manager last week?", a: "who called her", i: ["who she called", "that she called"]},
            {q: "What kind of job is advertised?", a: "marketing", i: ["accounting", "teaching"]},
            {q: "What is a part of the job?", a: "answering customers", i: ["coding", "designing"]},
            {q: "What does the announcement say?", a: "You can get on the plane now.", i: ["The flight is delayed.", "Economy is full."]},
            {q: "What can passengers in economy do?", a: "They can wait.", i: ["They can board first.", "They can upgrade for free."]},
            {q: "I feel like having shrimp. Ugh, no, I don't like ...", a: "seafood", i: ["vegetables", "meat"]},
            {q: "Do you like Ethiopian food? I do, but I prefer Kenyan ... Ethiopian.", a: "to", i: ["than", "over"]},
            {q: "Why is Ben's Deli terrible?", a: "unfriendly and the food is awful", i: ["too expensive", "service is too slow"]},
            {q: "Is that hotel really ...?", a: "the most comfortable", i: ["more comfortable", "most comfort"]},
            {q: "Who is the text for?", a: "people who are on a business trip", i: ["students", "tourists"]},
            {q: "What should you bring on the tour?", a: "an umbrella", i: ["sunscreen", "a laptop"]},
            {q: "How many people are staying?", a: "Three", i: ["Two", "Four"]},
            {q: "What kind of room does the caller reserve?", a: "two rooms", i: ["a single room", "a suite"]},
            {q: "Do you play the piano? Not anymore. I stopped ...", a: "last year.", i: ["a month ago.", "yesterday."]},
            {q: "Why do you hate ... with that pianist?", a: "to sing", i: ["to play", "to dance"]},
            {q: "How does the lemon juice taste?", a: "sour", i: ["sweet", "bitter"]},
            {q: "How often does Annie exercise?", a: "occasionally", i: ["daily", "never"]},
            {q: "When does Annie exercise?", a: "if the sun is shining", i: ["at night", "in the rain"]},
            {q: "What is good advice for Annie?", a: "Why don't you try running with friends?", i: ["Just stay home", "Eat more sugar"]},
            {q: "How often does Ariel go running?", a: "regularly", i: ["rarely", "never"]},
            {q: "When does Ariel run?", a: "in the evenings", i: ["in the morning", "at noon"]},
            {q: "Did you download MP3s in the old days? No, we didn't.", a: "didn't use to download music", i: ["used to buy records", "didn't use to have internet"]},
            {q: "That knob is ... off the dryer.", a: "to turn", i: ["for turn", "turning"]},
            {q: "Do you know ...?", a: "if there is a monthly fee", i: ["how is the fee", "where the fee is"]},
            {q: "Make yourself...", a: "at home", i: ["comfortable", "ready"]},
            {q: "What is the new apartment like?", a: "It has enough bedrooms.", i: ["It is very small.", "It has no windows."]},
            {q: "When did these events take place?", a: "in the 1980s", i: ["in the 1970s", "last year"]},
            {q: "What is better about the world now?", a: "He can talk to his friends more often.", i: ["Everything is cheaper", "People listen to radio more"]},
            {q: "When does the train arrive ... London?", a: "in", i: ["at", "on"]},
            {q: "She usually ... the bus to work.", a: "takes", i: ["take", "taking"]},
            {q: "Where do you work?", a: "large French Internet provider", i: ["small car manufacturer", "medium bottle factory"]},
            {q: "What is Ariel's problem?", a: "not in shape", i: ["flu", "tired"]},
            {q: "We all enjoy ... the guitar.", a: "playing", i: ["to play", "play"]},
            {q: "What's the matter? Debbie...", a: "is feeling sick", i: ["hit her head", "has a sore throat"]},
            {q: "Who is Martin?", a: "manager", i: ["colleague", "teacher"]},
            {q: "I'm so glad you could...", a: "join us", i: ["meet us", "visit us"]},
            {q: "Where do you eat dinner?", a: "dining room", i: ["kitchen", "living room"]},
            {q: "How does Sam go to school?", a: "She walks alone.", i: ["She goes by bus.", "She walks with friends."]},
            {q: "What did they do then?", a: "wrote a lot of postcards", i: ["sent emails", "called each other"]},
            {q: "One ticket to Charlotte - business class or...", a: "economy", i: ["first class", "standard"]},
            {q: "Who is Andy?", a: "woman who works for Gordon", i: ["man who manages sales", "manager"]},
            {q: "What is the job?", a: "an office assistant", i: ["marketing manager", "sales representative"]},
            {q: "The suite was ... room in the hotel.", a: "the biggest", i: ["the smaller", "most big"]},
            {q: "Is collecting stamps your hobby?", a: "Yes, it still is", i: ["No, it isn't", "It used to be"]},
            {q: "What is wrong with her?", a: "sore throat", i: ["headache", "stomachache"]},
            {q: "I use my tablet ... the lights.", a: "to turn", i: ["for turning", "turning"]},
            {q: "Where can I do my work?", a: "study", i: ["bedroom", "garage"]},
            {q: "... lovely garden you have!", a: "What a", i: ["How", "Such"]},
            {q: "What is different about the world now?", a: "People don't listen to the radio as much", i: ["People travel less", "Internet is slower"]},
            {q: "I'm coming home on Thursday - ... ticket, please.", a: "one-way", i: ["round-trip", "fast"]},
            {q: "Nihal and I are going ... our friends this weekend.", a: "to visit", i: ["visit", "visiting"]},
            {q: "What should you bring to the beach?", a: "shoes", i: ["an umbrella", "a coat"]},
            {q: "What does AutoSAX do?", a: "small Spanish car radio manufacturer", i: ["Internet provider", "Bottle manufacturer"]},
            {q: "Do you like chicken?", a: "more than", i: ["to", "over"]},
            {q: "How is the new house?", a: "There's a lot of light.", i: ["It's very dark.", "It's too small."]},
            {q: "What is a part of the job?", a: "planning meetings", i: ["designing logos", "writing code"]},
            {q: "Who can get the job?", a: "Sara, 30, manages the office", i: ["Arlo, 35, customer service", "John, 25, graduate"]}
        ];

        let quiz = [...db].sort(() => 0.5 - Math.random()).slice(0, 60);
        let currentIdx = 0, score = 0, history = [];

        function render() {
            if (currentIdx >= quiz.length) { showResults(); return; }
            const q = quiz[currentIdx];
            document.getElementById('progress').innerText = `سؤال ${currentIdx + 1} من ${quiz.length}`;
            document.getElementById('question').innerText = q.q;
            let opts = [q.a, ...q.i].sort(() => 0.5 - Math.random());
            document.getElementById('choices').innerHTML = opts.map(o => `
                <button onclick="select('${o.replace(/'/g, "\\'")}')" class="w-full p-4 border-2 rounded-lg hover:bg-gray-50 transition">${o}</button>
            `).join('');
        }

        function select(ans) {
            const q = quiz[currentIdx];
            const isCorrect = ans === q.a;
            if (isCorrect) score++;
            history.push({q: q.q, selected: ans, correct: q.a});
            
            const btns = document.querySelectorAll('#choices button');
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === q.a) b.classList.add('bg-green-200', 'border-green-500');
                if (b.innerText === ans && !isCorrect) b.classList.add('bg-red-200', 'border-red-500');
            });
            setTimeout(() => { currentIdx++; render(); }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = `النتيجة النهائية: ${score} من 60`;
            let table = `<table class="w-full text-sm"><thead><tr><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th></tr></thead><tbody>`;
            history.forEach(h => {
                table += `<tr class="${h.selected === h.correct ? 'bg-green-50' : 'bg-red-50'} border-b">
                    <td class="p-2">${h.q}</td><td class="p-2">${h.selected}</td><td class="p-2">${h.correct}</td>
                </tr>`;
            });
            document.getElementById('report-table').innerHTML = table + `</tbody></table>`;
        }
        render();
    </script>
</body>
</html>
